# 生产者配置
producer.count=1

# 消费者线程池
consumer.core.pool.size=4
consumer.max.pool.size=8
consumer.keep.alive.seconds=60

# 任务队列容量
task.queue.capacity=500

# 限流配置（每秒请求数）
ratelimit.codeforces.per.second=3.0
ratelimit.luogu.per.second=2.0

# 重试配置
retry.max.attempts=3
retry.backoff.base.ms=1000
retry.backoff.multiplier=2.0

# HTTP超时配置（秒）
http.connect.timeout.seconds=10
http.read.timeout.seconds=30
http.write.timeout.seconds=10

# 数据存储目录
data.dir=data
